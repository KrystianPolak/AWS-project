name: CI/CD Pipeline

on:
  push:
    branches: [ main ] 

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v3

      - name: Instalacja Pythona
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalacja zależności
        run: |
          cd app
          pip install -r requirements.txt

      - name: Uruchomienie testów automatycznych (pytest)
        run: |
          cd app
          pytest test_app.py

  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: krystian01/todo-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Zaloguj się (opcjonalne dla publicznych obrazów, ale dobra praktyka)
            # 2. Pobierz najnowszy obraz
            docker pull krystian01/todo-app:latest
            # 3. Zatrzymaj i usuń stary kontener (jeśli istnieje)
            docker stop todo-app || true
            docker rm todo-app || true
            # 4. Uruchom nowy kontener na porcie 8080
            docker run -d --name todo-app -p 8080:8080 krystian01/todo-app:latest
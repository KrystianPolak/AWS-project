- name: Przygotowanie czystego serwera pod Dockera
  hosts: webservers
  become: yes

  tasks:
    - name: Aktualizacja repozytoriów apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Instalacja zaleznosci systemowych
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
        state: present

    - name: Dodaj klucz GPG Dockera
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Dodaj oficjalne repozytorium Docker
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present

    - name: Instalacja Docker Engine
      apt:
        name: 
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Dodaj uzytkownika ubuntu do grupy docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Sprawdz czy Docker dziala
      systemd:
        name: docker
        state: started
        enabled: yes